{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід — Навчайся легко</title>
    <link rel="stylesheet" href="{% static 'courses/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn-auth { background-color: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        .auth-card input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Вхід у систему 🔑</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-auth">Увійти</button>
            </form>
            <div style="margin-top: 20px;">
                Немає акаунта? <a href="{% url 'register' %}" style="color: #007bff; text-decoration: none;">Зареєструватися</a>
            </div>
        </div>
    </div>
</body>
</html>
